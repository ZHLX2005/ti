name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
            arch: arm64
          - os: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Add Linux ARM64 target
        if: matrix.arch == 'arm64'
        run: |
          rustup target add aarch64-unknown-linux-gnu

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev \
            librsvg2-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev || libwebkit2gtk-4.0-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install

      - name: Build Tauri App (macOS)
        if: runner.os == 'macOS'
        run: pnpm tauri build --target universal-apple-darwin

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        run: pnpm tauri build

      - name: Build Tauri App (Linux)
        if: runner.os == 'Linux'
        run: pnpm tauri build --bundles appimage,deb

      - name: Prepare Windows Assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $VERSION = "${{ github.ref_name }}"
          # MSI
          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle/msi' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $msi) {
            Copy-Item $msi.FullName "release-assets/ti-${VERSION}-Windows.msi"
          }
          # Portable exe
          $exe = 'src-tauri/target/release/ti.exe'
          if (Test-Path $exe) {
            Copy-Item $exe 'release-assets/ti.exe'
            Compress-Archive -Path "release-assets/ti.exe" -DestinationPath "release-assets/ti-${VERSION}-Windows-Portable.zip"
          }

      - name: Prepare macOS Assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${{ github.ref_name }}"
          TARBALL=$(find src-tauri/target -name "*.tar.gz" -path "*/bundle/*" | head -1)
          if [ -n "$TARBALL" ]; then
            cp "$TARBALL" "release-assets/ti-${VERSION}-macOS.tar.gz"
          fi

      - name: Prepare Linux Assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${{ github.ref_name }}"
          ARCH="${{ matrix.arch || 'x86_64' }}"
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1)
          [ -n "$APPIMAGE" ] && cp "$APPIMAGE" "release-assets/ti-${VERSION}-Linux-${ARCH}.AppImage"
          DEB=$(find src-tauri/target/release/bundle -name "*.deb" | head -1)
          [ -n "$DEB" ] && cp "$DEB" "release-assets/ti-${VERSION}-Linux-${ARCH}.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ti-${{ runner.os }}-${{ matrix.arch || runner.arch }}
          path: release-assets/*
