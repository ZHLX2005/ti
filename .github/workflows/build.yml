name: Build

on:
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            distro: Linux-x86_64
          - platform: windows-2022
            distro: Windows-x64
          - platform: macos-14
            distro: macOS-arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install deps
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev \
            libgtk-3-dev librsvg2-dev \
            libwebkit2gtk-4.1-dev || libwebkit2gtk-4.0-dev

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        timeout-minutes: 60
        run: pnpm tauri build --target universal-apple-darwin

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pnpm tauri build

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: pnpm tauri build --bundles deb,rpm

      - name: Collect Assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $msi = Get-ChildItem 'src-tauri/target/release/bundle/msi' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $msi) { Copy-Item $msi.FullName "release-assets/" -Force }
          $exe = Get-ChildItem 'src-tauri/target/release/ti.exe' -ErrorAction SilentlyContinue
          if ($null -ne $exe) { Copy-Item $exe.FullName "release-assets/" -Force }

      - name: Collect Assets (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release-assets
          find src-tauri/target -name "*.tar.gz" -path "*/bundle/*" | head -1 | xargs -I{} cp {} release-assets/

      - name: Collect Assets (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release-assets
          find src-tauri/target/release/bundle -name "*.deb" | head -1 | xargs -I{} cp {} release-assets/ || true
          find src-tauri/target/release/bundle -name "*.rpm" | head -1 | xargs -I{} cp {} release-assets/ || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ti-${{ matrix.distro }}
          path: release-assets/*
