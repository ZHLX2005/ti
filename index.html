<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>终端验证工具</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .container { display: flex; flex-direction: column; height: 100vh; }
      .control-panel { padding: 12px; background: #1e1e1e; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #333; }
      .terminal { flex: 1; background: #0c0c0c; padding: 8px; }
      button { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; font-size: 13px; transition: opacity 0.2s; }
      button:hover { opacity: 0.85; }
      button:active { opacity: 0.7; }
      .btn-default { background: #3a3a3a; color: #fff; }
      .btn-enter { background: #0a4a8a; color: #fff; }
      .btn-danger { background: #c41e3a; color: #fff; }
      .btn-cmd { background: #2d5a2d; color: #fff; }
      .status { color: #888; font-size: 12px; margin-left: auto; }
      #terminal { height: 100%; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="control-panel">
        <button class="btn-default" onclick="sendInput('r')">输入 'r'</button>
        <button class="btn-enter" onclick="sendInput('\r')">Enter</button>
        <button class="btn-danger" onclick="sendInput('\x03')">Ctrl+C</button>
        <button class="btn-default" onclick="sendInput('\x1a')">Ctrl+Z</button>
        <button class="btn-cmd" onclick="sendInput('ls -la\r')">ls -la</button>
        <button class="btn-cmd" onclick="sendInput('echo test\r')">echo test</button>
        <button class="btn-cmd" onclick="sendInput('dir\r')">dir</button>
        <span class="status" id="status">初始化中...</span>
      </div>
      <div class="terminal">
        <div id="terminal"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
