<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>终端验证工具</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .container { display: flex; flex-direction: column; height: 100vh; }
      .control-panel { padding: 12px; background: #1e1e1e; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #333; }
      .terminal { flex: 1; background: #0c0c0c; padding: 8px; }
      button { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; font-size: 13px; transition: opacity 0.2s; }
      button:hover { opacity: 0.85; }
      input { padding: 8px 12px; border: 1px solid #444; border-radius: 4px; background: #2a2a2a; color: #fff; font-size: 13px; width: 300px; }
      .btn-cmd { background: #2d5a2d; color: #fff; }
      .btn-exec { background: #0a4a8a; color: #fff; }
      .status { color: #888; font-size: 12px; margin-left: auto; }
      #terminal { height: 100%; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="control-panel">
        <input type="text" id="cmdInput" placeholder="输入命令..." onkeypress="if(event.key==='Enter')executeCommand()" />
        <button class="btn-exec" onclick="executeCommand()">执行</button>
        <button class="btn-cmd" onclick="sendCmd('echo test')">echo test</button>
        <button class="btn-cmd" onclick="sendCmd('ls -la')">ls -la</button>
        <button class="btn-cmd" onclick="sendCmd('pwd')">pwd</button>
        <span class="status" id="status">初始化中...</span>
      </div>
      <div class="terminal">
        <div id="terminal"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      function executeCommand() {
        const input = document.getElementById('cmdInput');
        const cmd = input.value.trim();
        if (cmd) {
          window.sendCommand(cmd);
          input.value = '';
        }
      }
      function sendCmd(cmd) {
        document.getElementById('cmdInput').value = cmd;
        window.sendCommand(cmd);
      }
    </script>
  </body>
</html>
